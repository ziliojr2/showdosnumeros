<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste - Show dos Números</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #10b981;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      font-weight: 900;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
    }
    .status {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .status-item:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .check {
      color: #10b981;
      font-weight: bold;
    }
    .info {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 24px;
      text-align: left;
    }
    .info div {
      padding: 4px 0;
    }
    button {
      background: #10b981;
      color: black;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #059669;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">B</div>
    <h1>Show dos Números</h1>
    <p class="subtitle">Teste de Ambiente</p>
    
    <div class="status">
      <div class="status-item">
        <span>HTML carregado</span>
        <span class="check">✓</span>
      </div>
      <div class="status-item">
        <span>CSS aplicado</span>
        <span class="check">✓</span>
      </div>
      <div class="status-item">
        <span>JavaScript funcionando</span>
        <span class="check">✓</span>
      </div>
      <div class="status-item">
        <span>Navegador compatível</span>
        <span class="check">✓</span>
      </div>
    </div>

    <button onclick="testarApp()">
      Testar App Completo →
    </button>

    <div class="info">
      <div><strong>URL:</strong> <span id="url"></span></div>
      <div><strong>Protocolo:</strong> <span id="protocol"></span></div>
      <div><strong>User Agent:</strong> <span id="ua"></span></div>
      <div><strong>Viewport:</strong> <span id="viewport"></span></div>
    </div>
  </div>

  <script>
    // Preencher informações
    document.getElementById('url').textContent = window.location.href;
    document.getElementById('protocol').textContent = window.location.protocol;
    document.getElementById('ua').textContent = navigator.userAgent.substring(0, 50) + '...';
    document.getElementById('viewport').textContent = window.innerWidth + 'x' + window.innerHeight;

    // Testar funcionalidades
    console.log('🎯 Teste de ambiente iniciado');
    console.log('✓ HTML carregado');
    console.log('✓ CSS aplicado');
    console.log('✓ JavaScript funcionando');
    console.log('URL:', window.location.href);
    console.log('Protocolo:', window.location.protocol);

    function testarApp() {
      console.log('🚀 Redirecionando para app completo...');
      window.location.href = 'index.html';
    }

    // Adicionar teste automático
    setTimeout(() => {
      console.log('✅ Todos os testes passaram!');
      console.log('📝 Se você está vendo esta página, o ambiente está funcionando.');
      console.log('👉 Clique em "Testar App Completo" para ir ao app principal.');
    }, 1000);
  </script>
</body>
</html>
